# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v5
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: Build binaries
        run: |
          mkdir -p bin
          go build -o bin/check ./cmd/check
          go build -o bin/in ./cmd/in
          go build -o bin/out ./cmd/out
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/

  e2e:
    runs-on: ubuntu-latest
    # Only run e2e tests when token is available (not on forks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run E2E tests
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_REPOSITORY: ujala-singh/github-repository-dispatch-receiver
        run: |
          echo "Running E2E tests with automatic GitHub token..."
          echo "Testing against repository: $TEST_REPOSITORY"
          go test -v -tags=e2e ./e2e/...

